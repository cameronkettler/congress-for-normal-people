services:
  db:
    image: postgres:17
    container_name: civic_pulse_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-civic_pulse}
      POSTGRES_USER: ${POSTGRES_USER:-civic_pulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-civic_pulse}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-civic_pulse} -d ${POSTGRES_DB:-civic_pulse}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-civic_pulse}:${POSTGRES_PASSWORD:-civic_pulse}@db:5432/${POSTGRES_DB:-civic_pulse}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
